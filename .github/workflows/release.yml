name: Release Font

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Font
        run: |
          mkdir dist
          # Zip the main font, OFL.txt, README.md, and samples
          zip -r "dist/Edaha.zip" Edaha.otf OFL.txt README.md samples/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
